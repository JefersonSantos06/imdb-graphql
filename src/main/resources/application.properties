spring.application.name=imdb-graphql

# --- Autenticacao (HTTP Basic simples, por enquanto) ---
spring.security.user.name=${APP_USER:admin}
spring.security.user.password=${APP_PASSWORD:admin123}

# --- JPA / Flyway (Flyway e a fonte do schema) ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# --- H2 console (inspecao do cache em dev) ---
spring.h2.console.enabled=true

# --- Wrapper IMDB ---
# TTL padrao do cache; pode ser sobrescrito por requisicao via ?ttl=<segundos>
app.imdb.cache-ttl=7d
# Locale padrao usado para o titulo local / sinopse quando nao informado na requisicao
app.imdb.default-locale=pt-BR
# Timeout de conexao/requisicao da chamada GraphQL ao IMDB
app.imdb.timeout=30s
